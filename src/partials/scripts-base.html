<script>
(function(){
  /* ===== Аналитика (заготовка): подключить GA4/Я.Метрику позже одной строкой в track() ===== */
  window.track=window.track||function(name,payload){
    window.dataLayer=window.dataLayer||[];
    window.dataLayer.push(Object.assign({event:name},payload||{}));
    if(window.console&&console.debug)console.debug('[track]',name,payload||{});
  };
})();
(function(){
  /* ===== Мобильное меню (бургер) ===== */
  var burger=document.querySelector('.nav-burger');
  var panel=document.getElementById('mobile-nav');
  if(!burger||!panel)return;
  function setOpen(open){
    panel.hidden=!open;
    burger.setAttribute('aria-expanded',open?'true':'false');
  }
  burger.addEventListener('click',function(){setOpen(panel.hidden);});
  panel.addEventListener('click',function(e){
    if(e.target.closest('a'))setOpen(false);
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'&&!panel.hidden)setOpen(false);
  });
  window.addEventListener('resize',function(){
    if(window.innerWidth>820&&!panel.hidden)setOpen(false);
  });
})();
(function(){
  /* ===== Анимация подсчёта цифр в блоке «Опыт» ===== */
  var nums=document.querySelectorAll('.trust-num[data-count]');
  if(!nums.length)return;
  var reduceMotion=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduceMotion){
    nums.forEach(function(el){el.textContent=el.dataset.count;});
    return;
  }
  function animateCount(el){
    var target=parseInt(el.dataset.count,10);
    var duration=1200;
    var start=null;
    function step(ts){
      if(!start)start=ts;
      var progress=Math.min((ts-start)/duration,1);
      var eased=1-Math.pow(1-progress,3);
      el.textContent=Math.round(eased*target);
      if(progress<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  var observer=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        animateCount(entry.target);
        observer.unobserve(entry.target);
      }
    });
  },{threshold:.4});
  nums.forEach(function(el){observer.observe(el);});
})();
(function(){
  /* ===== Мигание кнопки «Перейти в раздел» по клику ===== */
  document.querySelectorAll('.pc-action').forEach(function(btn){
    btn.addEventListener('click',function(){
      btn.classList.remove('is-blinking');
      void btn.offsetWidth;
      btn.classList.add('is-blinking');
    });
    btn.addEventListener('animationend',function(){btn.classList.remove('is-blinking');});
  });
})();
(function(){
  /* ===== Попапы: общая механика открытия/закрытия ===== */
  function openPopup(id){
    var p=document.getElementById(id);
    if(!p)return;
    if(id==='diagnostic-popup'&&typeof window.resetDiagnostic==='function')window.resetDiagnostic();
    p.classList.add('is-open');
    p.setAttribute('aria-hidden','false');
    document.body.classList.add('popup-locked');
  }
  function closePopup(p){
    p.classList.remove('is-open');
    p.setAttribute('aria-hidden','true');
    document.body.classList.remove('popup-locked');
  }
  window.closePopup=closePopup;
  document.addEventListener('click',function(e){
    var opener=e.target.closest('[data-popup-open]');
    if(opener){
      e.preventDefault();
      openPopup(opener.dataset.popupOpen);
      return;
    }
    var closer=e.target.closest('[data-popup-close]');
    if(closer){
      e.preventDefault();
      closePopup(closer.closest('.popup'));
    }
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
      var open=document.querySelector('.popup.is-open');
      if(open)closePopup(open);
    }
  });
})();
(function(){
  /* ===== Scroll-reveal секций и карточек ===== */
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  if(typeof IntersectionObserver==='undefined')return;
  var targets=document.querySelectorAll('main section, .product-grid > *');
  if(!targets.length)return;
  var observer=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  },{threshold:.12});
  targets.forEach(function(el,i){
    if(i===0)return; // первый экран (хиро) — без анимации, важен для LCP
    el.classList.add('reveal');
    if(el.getBoundingClientRect().top<window.innerHeight){
      el.classList.add('is-visible'); // уже во вьюпорте (короткая страница, переход по #hash) — без мигания
    }else{
      observer.observe(el);
    }
  });
})();
</script>
