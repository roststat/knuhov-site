<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <!-- абстракция «система роста»: слои, рост, фирменная мозаика; композиция утяжелена вправо -->
  <!-- крупный янтарный круг-солнце -->
  <circle cx="880" cy="300" r="230" fill="#e0a526" opacity=".9"/>
  <!-- синие слои-ступени с фирменным углом -->
  <path d="M620 520h420v90q0 34-34 34H620z" fill="#2563eb" opacity=".85"/>
  <path d="M700 680h340v80q0 30-30 30H700z" fill="#2563eb" opacity=".45"/>
  <!-- зелёная дуга роста -->
  <path d="M560 820Q820 780 1010 520" fill="none" stroke="#1f9d55" stroke-width="46" stroke-linecap="round"/>
  <path d="M1010 520l84-26-38 84z" fill="#1f9d55"/>
  <!-- красные акценты мозаики -->
  <path d="M1080 120h90v60q0 24-24 24h-66z" fill="#d02026"/>
  <path d="M990 60h70v50q0 20-20 20h-50z" fill="#d02026" opacity=".55"/>
  <!-- белая мозаика на круге -->
  <g fill="#fff">
    <path d="M820 240q0-16 16-16h30v46h-46z"/>
    <path d="M820 286h46v46h-30q-16 0-16-16z"/>
    <path d="M882 224h30q16 0 16 16v76q0 16-16 16h-30z"/>
  </g>
  <!-- рассыпанные квадраты-точки -->
  <rect x="640" y="300" width="26" height="26" fill="#2563eb"/>
  <rect x="700" y="180" width="20" height="20" fill="#1f9d55"/>
  <rect x="590" y="420" width="18" height="18" fill="#d02026"/>
  <rect x="1120" y="430" width="24" height="24" fill="#e0a526"/>
</svg>
